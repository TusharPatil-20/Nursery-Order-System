{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='plant.css') }}">

<h2 class="page-title">{{ category|capitalize }} Plants</h2>

<div class="cards">
    {% for p in plants %}
    <div class="card">
        <img src="/static/images/{{ p[4] }}" alt="{{ p[2] }}">
        <h3>{{ p[2] }}</h3>
        <p>₹{{ p[3] }}</p>
        <a href="/plant/{{ p[0] }}">View Details</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
